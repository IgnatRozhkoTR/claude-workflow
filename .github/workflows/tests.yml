name: Admin Panel Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install flask flask-sock pytest "mcp[cli]" jsonschema beautifulsoup4 yoyo-migrations

      - name: Run tests
        run: cd admin-panel/server && python3 -m pytest tests/ -v --tb=short
